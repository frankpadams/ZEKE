<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#f6f4ef; --ink:#1f2933; --muted:#697386; --card:#fffaf2; --line:#e5dccb; --accent:#5b6f50; --accent2:#263f5e; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:24px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:2; }
    h1 { margin:0; font-size:28px; letter-spacing:.02em; }
    .sub { color:var(--muted); margin-top:4px; }
    .wrap { max-width:1100px; margin:0 auto; padding:18px; }
    .status { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; font-size:13px; color:var(--muted); }
    .pill { border:1px solid var(--line); border-radius:999px; padding:6px 10px; background:#fff; }
    .capture { background:#fff; border:1px solid var(--line); border-radius:20px; padding:18px; margin:18px 0; box-shadow:0 8px 25px rgba(31,41,51,.05); }
    textarea { width:100%; min-height:92px; box-sizing:border-box; border:1px solid var(--line); border-radius:14px; padding:14px; font-size:17px; background:#fffdf9; }
    button { border:none; border-radius:999px; padding:11px 16px; font-weight:700; background:var(--accent); color:white; cursor:pointer; }
    button.secondary { background:#fff; color:var(--accent2); border:1px solid var(--line); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px; box-shadow:0 8px 25px rgba(31,41,51,.04); }
    .card h2 { margin:0 0 10px; font-size:21px; }
    .item { border-top:1px solid var(--line); padding:10px 0; }
    .item:first-of-type { border-top:none; }
    .muted { color:var(--muted); font-size:14px; }
    .row { display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .done { color:var(--accent); font-weight:700; }
    .exercise { background:#fffdf9; border:1px solid var(--line); border-radius:14px; padding:10px; margin:8px 0; }
    .small { font-size:13px; color:var(--muted); }
    .recent { margin-top:16px; }
    pre { white-space:pre-wrap; background:#fff; border:1px solid var(--line); border-radius:14px; padding:10px; max-height:220px; overflow:auto; }
  </style>
</head>
<body>
  <header>
    <div class="wrap" style="padding:0">
      <h1>ZEKE</h1>
      <div class="sub">Zero-friction Evidence & Knowledge Engine · Private Alpha</div>
      <div class="status" id="status"></div>
    </div>
  </header>
  <main class="wrap">
    <section class="capture">
      <h2>Quick Capture</h2>
      <p class="muted">Type anything. ZEKE preserves the raw note first, then interprets it when possible.</p>
      <textarea id="captureText" placeholder="Example: I took atorvastatin, walked Rosie 25 minutes, and weighed 214.8 lbs."></textarea>
      <div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap">
        <button onclick="submitCapture()">Save</button>
        <button class="secondary" onclick="refresh()">Refresh Dashboard</button>
      </div>
      <pre id="captureResult" style="display:none"></pre>
    </section>

    <section class="grid" id="domainGrid"></section>

    <section class="card recent">
      <h2>Recent Activity</h2>
      <div id="recent"></div>
    </section>
  </main>
<script>
function setLoading(msg){ document.getElementById('status').innerHTML = '<span class="pill">' + msg + '</span>'; }
function refresh(){
  setLoading('Loading...');
  google.script.run.withSuccessHandler(render).withFailureHandler(err => setLoading('Error: ' + err.message)).getDashboardData();
}
function render(data){
  document.getElementById('status').innerHTML = `
    <span class="pill">${data.today}</span>
    <span class="pill">AI: ${data.aiEnabled ? 'Google AI enabled' : 'Local parser'}</span>
    <span class="pill">Dashboard: ${data.dashboardMode}</span>
    <span class="pill">v${data.version}</span>`;
  const grid = document.getElementById('domainGrid');
  grid.innerHTML = '';
  Object.keys(data.domains).forEach(k => grid.appendChild(renderDomainCard(k, data.domains[k])));
  const recent = document.getElementById('recent');
  recent.innerHTML = (data.recentActivity || []).map(e => `<div class="item"><b>${escapeHtml(e.display_title || e.category)}</b><div class="muted">${escapeHtml(e.domain)} · ${escapeHtml(e.event_date)} · ${escapeHtml(e.confidence)}</div></div>`).join('') || '<p class="muted">No activity yet.</p>';
}
function renderDomainCard(key, d){
  const el = document.createElement('section'); el.className='card';
  let html = `<h2>${escapeHtml(d.title || key)}</h2>`;
  if (d.routines) html += d.routines.map(r => `<div class="item row"><div><b>${escapeHtml(r.name)}</b><div class="muted">${r.doneToday ? '<span class="done">Done today</span>' : 'Not logged today'}</div></div><button class="secondary" onclick="markRoutine('${escapeJs(r.id)}')">${escapeHtml(r.action || 'Done')}</button></div>`).join('');
  if (d.exercisePlan) html += `<p class="muted">Today’s exercise considerations. Adjust for pain, form, and PT guidance.</p>` + d.exercisePlan.map(x => `<div class="exercise"><b>${escapeHtml(x.name)}</b><div>${x.sets} sets · ${escapeHtml(x.reps)} reps · ~${x.suggested_weight_lb} lb</div><div class="small">${escapeHtml(x.reason)} Confidence in analysis: ${escapeHtml(x.confidence_in_analysis)}${x.caution ? ' · Caution: ' + escapeHtml(x.caution) : ''}</div></div>`).join('');
  if (d.notes) html += d.notes.map(n => `<div class="item"><b>${escapeHtml(n.title)}</b><div class="muted">${escapeHtml(n.status)}</div></div>`).join('');
  el.innerHTML = html; return el;
}
function submitCapture(){
  const text = document.getElementById('captureText').value.trim(); if (!text) return;
  document.getElementById('captureResult').style.display='block'; document.getElementById('captureResult').textContent='Saving...';
  google.script.run.withSuccessHandler(res => { document.getElementById('captureResult').textContent = JSON.stringify(res, null, 2); document.getElementById('captureText').value=''; refresh(); }).withFailureHandler(err => { document.getElementById('captureResult').textContent = 'Error: ' + err.message; }).submitQuickCapture(text);
}
function markRoutine(id){ google.script.run.withSuccessHandler(refresh).withFailureHandler(err => alert(err.message)).markRoutineDone(id); }
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeJs(s){ return String(s ?? '').replace(/'/g, "\\'"); }
refresh();
</script>
</body>
</html>
